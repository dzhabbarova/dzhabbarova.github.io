      <!-- Hidden identity form -->
      <form id="spIdentityForm" style="display:none">
        <input type="email" name="email" id="spIdentityEmail">
      </form>

      <!-- SendPulse Pixel Event fields and button -->
      <p align="center">
        <input type="text" id="eventName" placeholder="name"><br><br>
        <input type="number" id="eventAge" placeholder="age"><br><br>
        <input type="text" id="eventDate" placeholder="date (e.g. 2026-03-19)"><br><br>
        <input type="email" id="eventEmail" placeholder="email"><br><br>
        <button id="testEventBtn">Test SendPulse Event</button>
      </p>

      <script>
        var EVENT_ID = '4cf18c54-aa0a-465a-b8c0-092ac00e45b8';
        var PROJECT_ID = 'a8ea1a3d-c649-4bc2-94a8-8bc5dd8c77fc';
        window._spPixelRulesLoaded = false;

        fetch('https://pixel.sppopups.com/gpi-data/data-' + PROJECT_ID + '.json')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            window._spPixelRulesLoaded = true;
          })
          .catch(function() {
            window._spPixelRulesLoaded = true;
          });

        function waitForPixelReady(callback, retries) {
          retries = retries || 0;
          if (retries > 50) return;
          if (typeof window.SP_PIN !== 'undefined' && window._spPixelRulesLoaded) {
            callback();
          } else {
            setTimeout(function() { waitForPixelReady(callback, retries + 1); }, 200);
          }
        }

        function identifyAndFire(name, age, date, email) {
          var identityEmail = document.getElementById('spIdentityEmail');
          identityEmail.value = email;
          document.getElementById('spIdentityForm').dispatchEvent(
            new Event('submit', { bubbles: true })
          );

          setTimeout(function() {
            window.SP_PIN.fireEvent(
              EVENT_ID,
              {
                name: name,
                age: age,      // Number
                date: date,
                email: email
              }
            );
            console.log('fireEvent called with:', name, age, date, email);
          }, 500);
        }

        document.addEventListener('DOMContentLoaded', function() {
          document.getElementById('testEventBtn').addEventListener('click', function() {
            var name  = document.getElementById('eventName').value.trim();
            var age   = parseInt(document.getElementById('eventAge').value.trim(), 10);
            var date  = document.getElementById('eventDate').value.trim();
            var email = document.getElementById('eventEmail').value.trim();

            if (!email) { alert('Email is required.'); return; }
            if (!name)  { alert('Name is required.'); return; }
            if (isNaN(age)) { alert('Age must be a number.'); return; }
            if (!date)  { alert('Date is required.'); return; }

            waitForPixelReady(function() {
              identifyAndFire(name, age, date, email);
            });
          });
        });
      </script>
