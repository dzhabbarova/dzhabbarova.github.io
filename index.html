              alert('Please enter an email address first.');
              return;

            console.log('Email value:', email);
            console.log('SP_PIN status:', typeof window.SP_PIN);

            if (typeof window.SP_PIN === 'undefined') {
              console.warn('SP_PIN not ready — retrying in 300ms');

                document.getElementById('testEventBtn').click();
              }, 300);
