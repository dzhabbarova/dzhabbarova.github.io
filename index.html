      <!-- Hidden identity form — used to register visitor email with the pixel -->
      <form id="spIdentityForm" style="display:none">
        <input type="email" name="email" id="spIdentityEmail">
      </form>

      <!-- SendPulse Pixel Event Test Button -->
      <p align="center">
        <button id="testEventBtn">Test SendPulse Event</button>
      </p>

         <script src="https://spxl.sppopups.com/pulsepix.js" data-project-id="a8ea1a3d-c649-4bc2-94a8-8bc5dd8c77fc"></script>

      <script>
        var EVENT_ID = '4cf18c54-aa0a-465a-b8c0-092ac00e45b8';
        var PROJECT_ID = 'a8ea1a3d-c649-4bc2-94a8-8bc5dd8c77fc';
        window._spPixelRulesLoaded = false;

        // Mirror the pixel's own gpi-data fetch so we know when rules are ready
        fetch('https://pixel.sppopups.com/gpi-data/data-' + PROJECT_ID + '.json')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            console.log('gpi-data loaded, events found:', data.data.events.length);
            window._spPixelRulesLoaded = true;
          })
          .catch(function(e) {
            console.error('gpi-data fetch failed:', e);
            window._spPixelRulesLoaded = true;
          });

        function waitForPixelReady(callback, retries) {
          retries = retries || 0;
          if (retries > 50) {
            console.error('SendPulse pixel did not become ready after 10s.');
            return;
          }
          if (typeof window.SP_PIN !== 'undefined' && window._spPixelRulesLoaded) {
            callback();
          } else {
            setTimeout(function() { waitForPixelReady(callback, retries + 1); }, 200);
          }
        }

        function identifyAndFire(email) {
          // Step 1: submit the hidden form so the pixel registers visitor identity
          var identityEmail = document.getElementById('spIdentityEmail');
          identityEmail.value = email;
          var form = document.getElementById('spIdentityForm');
          form.dispatchEvent(new Event('submit', { bubbles: true }));

          // Step 2: wait 500ms for identity to register, then fire the event
          setTimeout(function() {
            console.log('Firing pixel event for:', email);
            window.SP_PIN.fireEvent(
              EVENT_ID,
              {
                name: 'Test User',   // replace with real value when needed
                age: 25,             // replace with real value when needed
                date: '2026-03-19',  // replace with real value when needed
                email: email
              }
            );
            console.log('fireEvent called!');
          }, 500);
        }

        document.addEventListener('DOMContentLoaded', function() {
          console.log('DOM ready — attaching SendPulse event listener');

          document.getElementById('testEventBtn').addEventListener('click', function() {
            var email = document.querySelector('input[name="email"]').value.trim();
            if (!email) {
              alert('Please enter an email address first.');
              return;
            }

            waitForPixelReady(function() {
              identifyAndFire(email);
            });
          });
        });
      </script>
